---
launch:
  # In arg, all the default value should be string
  - arg: {name: start_rviz,  default: "false"}
  - arg: {name: namespace,  default: "km_sam", description: KISS-Matcher-SAM (KM-SAM)}
  - arg: {name: use_sim_time, default: "true", description: "Set true when replaying a bag so TF stamps share the sim clock with Fast-LIO"}

  - arg: {name: rviz_path,  default: $(find-pkg-share kiss_matcher_ros)/rviz/kiss_matcher_sam.rviz}
  - arg: {name: config_path,   default: $(find-pkg-share kiss_matcher_ros)/config/campus_spring_slam.yaml}

  - arg: {name: map_frame , default: 'map' , description: "Global (loop-closure corrected) frame"}
  - arg: {name: odom_frame, default: 'dcp2/odom', description: "Fast-LIO odometry frame (child of map)"}
  - arg: {name: base_frame, default: 'dcp2/os_sensor', description: "Robot's base frame (kept for compatibility)"}

  - arg: {name: odom_topic, default: "/dcp2/odometry/imu"}
  - arg: {name: scan_topic, default: "/dcp2/ouster/points"}

  - node:
      namespace: $(var namespace)
      pkg: kiss_matcher_ros
      exec: kiss_matcher_sam
      name: kiss_matcher_sam
      sigterm_timeout: 60.0
      sigkill_timeout: 60.0
      output: screen
      on_exit: shutdown

      remap:
        # Subscriber topics
        - { from: '/cloud', to: $(var scan_topic) }
        - { from: '/odom',   to: $(var odom_topic) }

      param:
        - name: "use_sim_time"
          value: $(var use_sim_time)
        - name: "map_frame"
          value: "$(var map_frame)"
        - name: "odom_frame"
          value: "$(var odom_frame)"
        - name: "base_frame"
          value: "$(var base_frame)"

        - from: $(var config_path)

  - node:
      if: $(var start_rviz)
      pkg: rviz2
      exec: rviz2
      name: km_sam_rviz
      launch-prefix: nice
      output: screen
      param:
        - name: "use_sim_time"
          value: $(var use_sim_time)
      args: >
        -d $(var rviz_path)
